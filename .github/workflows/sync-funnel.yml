name: Sync Funnel → Supabase

# NOTE: This workflow is DISABLED.
# Data now comes from the Railway app (https://lafa-nexiu-os-production.up.railway.app/workflow)
# and is synced daily at 8am by the macOS launchd agent:
#   ~/Library/LaunchAgents/com.nexiu.lafa.sync.plist
#   Script: /Users/ivan/Code/vibe-coding/nexiu/LAFA/sync_railway.py
#
# To re-enable, restore the 'on:' triggers below and update the download step
# to use the Railway export URL instead of Google Sheets.

on:
  workflow_dispatch:   # manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Download Google Sheet (Funnel)
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1gNO5hjv7R4XUqyVUi2nHk5LtgHOV9ugm/export?format=xlsx" \
            -o funnel.xlsx
          echo "Descargado: $(du -h funnel.xlsx | cut -f1)"

      - name: Upload to Supabase
        run: |
          PERIODO="2026-04-01_$(date -u +%Y-%m-%d)"
          echo "Periodo: $PERIODO"
          python3 upload_to_supabase.py funnel.xlsx --periodo "$PERIODO"
